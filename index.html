<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <!-- Explicitly request microphone permission via Permissions Policy -->
  <meta http-equiv="Permissions-Policy" content="microphone=(self)">
  <title>SwiftVoice | Voice Speed Trainer</title>
  <meta name="description"
    content="SwiftVoice is a privacy-first voice typing trainer powered by the browser's built-in Web Speech API. No data ever leaves your device — 100% local processing.">
  <meta name="keywords"
    content="voice typing, voice speed test, wpm, speech recognition, voice trainer, web speech api, privacy, offline, local, swift voice">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://swiftvoice.murdawkmedia.com/">
  <meta property="og:title" content="SwiftVoice | Voice Speed Trainer">
  <meta property="og:description" content="Train your voice typing speed. 100% private — all speech processing happens locally in your browser.">
  <meta property="og:image" content="/logo.png">

  <!-- Twitter -->
  <meta property="twitter:card" content="summary_large_image">
  <meta property="twitter:url" content="https://swiftvoice.murdawkmedia.com/">
  <meta property="twitter:title" content="SwiftVoice | Voice Speed Trainer">
  <meta property="twitter:description"
    content="Train your voice typing speed. 100% private — all speech processing happens locally in your browser.">
  <meta property="twitter:image" content="/logo.png">

  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SwiftVoice",
      "applicationCategory": "EducationalApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "A privacy-first voice typing trainer using the browser's built-in Web Speech API. No audio ever leaves your device.",
      "featureList": "Voice speed tracking, WPM tracking, Accuracy tracking, Dark/Light mode, Multiple durations, 100% local processing, No account required",
      "author": {
        "@type": "Organization",
        "name": "Murdawk Media",
        "url": "https://www.murdawkmedia.com"
      }
    }
    </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/png" href="/favicon.png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #161617;
      color: #f5f5f7;
      /* Prevent iOS elastic overscroll ruining the layout */
      overscroll-behavior: none;
    }

    .apple-blur {
      backdrop-filter: saturate(180%) blur(20px);
      -webkit-backdrop-filter: saturate(180%) blur(20px);
    }

    .cursor-blink {
      animation: blink 1s step-end infinite;
    }

    @keyframes blink {
      from, to { border-color: transparent; }
      50% { border-color: #3b82f6; }
    }

    ::selection {
      background: rgba(0, 113, 227, 0.2);
    }

    /* Smooth font rendering on macOS/iOS */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.3/",
    "react": "https://esm.sh/react@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
